# dynoconf reference client config (env-overridable).
spring.main.web-application-type=none
spring.main.banner-mode=off

config.service.addr=${CONFIG_SERVICE_ADDR:localhost:9090}
config.service.key=${CONFIG_SERVICE_KEY:}
config.watch.key=${WATCH_KEY:GREETING}

logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
