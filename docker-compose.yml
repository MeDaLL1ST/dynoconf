# Local development stack: Postgres + the config-service.
#
# By default this uses DEV_AUTH_EMAIL to bypass OIDC so you can log in locally
# without a GitLab. To test real OIDC, comment out DEV_AUTH_EMAIL and fill in the
# OIDC_* variables (see README "Testing OIDC locally").
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dynoconf
      POSTGRES_PASSWORD: dynoconf
      POSTGRES_DB: dynoconf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dynoconf"]
      interval: 3s
      timeout: 3s
      retries: 20

  dynoconf:
    image: medall1st/dynoconf:1.0.0
    # `build: .` builds locally and tags it as the image above. Remove `build`
    # (or run `docker compose pull`) to use the published Docker Hub image.
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://dynoconf:dynoconf@postgres:5432/dynoconf?sslmode=disable
      CONTOUR_NAME: local
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      SESSION_SECRET: "dev-secret-change-me"
      BOOTSTRAP_ADMIN_EMAIL: "admin@example.com"
      # Local dev login (no OIDC). Signs you in as this email on /auth/login.
      DEV_AUTH_EMAIL: "admin@example.com"
      COOKIE_SECURE: "false"
      # --- For real OIDC instead, remove DEV_AUTH_EMAIL and set: ---
      # OIDC_ISSUER: "https://gitlab.example.com"
      # OIDC_CLIENT_ID: "..."
      # OIDC_CLIENT_SECRET: "..."
      # OIDC_REDIRECT_URL: "http://localhost:8080/auth/callback"
    ports:
      - "8080:8080" # UI / REST (behind VPN in production)
      - "9090:9090" # gRPC (cluster-internal in production)

volumes:
  pgdata:
