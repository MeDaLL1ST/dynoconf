name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Go build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dynoconf
          POSTGRES_PASSWORD: dynoconf
          POSTGRES_DB: dynoconf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dynoconf"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Use the service Postgres directly so DB-backed tests don't need testcontainers.
      TEST_DATABASE_URL: postgres://dynoconf:dynoconf@localhost:5432/dynoconf?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dynoconf:ci
